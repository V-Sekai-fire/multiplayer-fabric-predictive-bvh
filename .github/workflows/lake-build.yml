name: lake build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: lake-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Installs the Lean toolchain pinned in `lean-toolchain`, restores the
      # mathlib + dependency cache, and runs `lake build` (the default target,
      # which is the `bvh-codegen` exe per `lakefile.lean`).
      - name: lake build (default target)
        uses: leanprover/lean-action@v1
        with:
          test: false
          lint: false

      # Informational: the proof library currently has known-broken modules
      # (`Tree`, `Partition`, `Fabric`, `ReBAC`). This step surfaces the state
      # without gating the PR.
      - name: lake build PredictiveBVH (library, informational)
        run: lake build PredictiveBVH
        continue-on-error: true
